{{ template "page/head_start" .}}
<style>
  html * {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .centered {
    display: flex;
    text-align: center;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .under {
    background-color: #c7ebe2;
    z-index: 0;
  }

  .dark .under {
    background-color: var(--dark-color-login-wave);
  }

  .traffic-card {
    border-radius: 1rem;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .dark .traffic-card {
    background-color: var(--dark-color-surface-100);
  }

  .dark .traffic-card .ant-descriptions-item-label,
  .dark .traffic-card .ant-descriptions-item-content {
    color: rgba(255, 255, 255, 0.85);
    background-color: transparent;
  }

  .dark .traffic-card .ant-descriptions-bordered .ant-descriptions-item-label {
    background-color: rgba(255, 255, 255, 0.04);
    border-color: rgba(255, 255, 255, 0.12);
  }

  .dark .traffic-card .ant-descriptions-bordered .ant-descriptions-item-content {
    border-color: rgba(255, 255, 255, 0.12);
  }

  .dark .traffic-card .ant-descriptions-row {
    border-color: rgba(255, 255, 255, 0.12);
  }

  .status-enabled {
    color: #52c41a;
  }

  .status-disabled {
    color: #ff4d4f;
  }
</style>
{{ template "page/head_end" .}}

{{ template "page/body_start" .}}
<a-layout id="app" v-cloak :class="themeSwitcher.currentTheme">
  <a-layout-content class="under">
    <a-row type="flex" justify="center" align="middle" :style="{ minHeight: '100vh' }">
      <a-col :xs="22" :sm="18" :md="14" :lg="10" :xl="8">
        <div class="setting-section">
          <a-popover :overlay-class-name="themeSwitcher.currentTheme" title='{{ i18n "menu.settings" }}'
            placement="bottomRight" trigger="click">
            <template slot="content">
              <a-space direction="vertical" :size="10">
                <a-theme-switch-login></a-theme-switch-login>
                <span>{{ i18n "pages.settings.language" }}</span>
                <a-select ref="selectLang" class="w-100" v-model="lang" @change="LanguageManager.setLanguage(lang)"
                  :dropdown-class-name="themeSwitcher.currentTheme">
                  <a-select-option :value="l.value" label="English" v-for="l in LanguageManager.supportedLanguages">
                    <span role="img" aria-label="l.name" v-text="l.icon"></span>
                    &nbsp;&nbsp;<span v-text="l.name"></span>
                  </a-select-option>
                </a-select>
              </a-space>
            </template>
            <a-button shape="circle" icon="setting"></a-button>
          </a-popover>
        </div>
        <div class="centered" :style="{ marginBottom: '2rem' }">
          <h2>{{ i18n "pages.user.title" }}</h2>
        </div>
        <template v-if="loading">
          <div class="centered">
            <a-spin size="large" />
          </div>
        </template>
        <template v-else>
          <a-card class="traffic-card" v-for="item in inbounds" :key="item.remark + item.protocol">
            <a-descriptions :column="1" bordered size="small">
              <a-descriptions-item label='{{ i18n "pages.user.remark" }}'>
                [[ item.remark || '-' ]]
              </a-descriptions-item>
              <a-descriptions-item label='{{ i18n "pages.user.protocol" }}'>
                [[ item.protocol ]]
              </a-descriptions-item>
              <a-descriptions-item label='{{ i18n "pages.user.upload" }}'>
                [[ SizeFormatter.sizeFormat(item.up) ]]
              </a-descriptions-item>
              <a-descriptions-item label='{{ i18n "pages.user.download" }}'>
                [[ SizeFormatter.sizeFormat(item.down) ]]
              </a-descriptions-item>
              <a-descriptions-item label='{{ i18n "pages.user.totalTraffic" }}'>
                <template v-if="item.total > 0">
                  [[ SizeFormatter.sizeFormat(item.up + item.down) ]] / [[ SizeFormatter.sizeFormat(item.total) ]]
                  <a-progress :percent="NumberFormatter.toFixed((item.up + item.down) / item.total * 100, 1)" size="small"
                    :status="((item.up + item.down) / item.total * 100) >= 90 ? 'exception' : 'normal'" />
                </template>
                <template v-else>{{ i18n "unlimited" }}</template>
              </a-descriptions-item>
              <a-descriptions-item label='{{ i18n "pages.user.expiryTime" }}'>
                <template v-if="item.expiryTime > 0">
                  <span :class="{ 'text-red': item.expiryTime < Date.now() }">
                    [[ formatExpiryTime(item.expiryTime) ]]
                  </span>
                </template>
                <template v-else>{{ i18n "unlimited" }}</template>
              </a-descriptions-item>
              <a-descriptions-item label='{{ i18n "pages.user.status" }}'>
                <span :class="item.enable ? 'status-enabled' : 'status-disabled'">
                  [[ item.enable ? '{{ i18n "pages.user.statusEnabled" }}' : '{{ i18n "pages.user.statusDisabled" }}' ]]
                </span>
              </a-descriptions-item>
            </a-descriptions>
          </a-card>
          <div v-if="inbounds.length === 0" class="centered">
            <a-empty description='{{ i18n "pages.user.noData" }}' />
          </div>
          <div class="centered" :style="{ marginTop: '2rem' }">
            <a-button type="primary" icon="logout" @click="logout">
              {{ i18n "menu.logout" }}
            </a-button>
          </div>
        </template>
      </a-col>
    </a-row>
  </a-layout-content>
</a-layout>
{{template "page/body_scripts" .}}
{{template "component/aThemeSwitch" .}}
<script>
  const app = new Vue({
    delimiters: ['[[', ']]'],
    el: '#app',
    data: {
      themeSwitcher,
      inbounds: [],
      loading: true,
      lang: '',
    },
    async mounted() {
      this.lang = LanguageManager.getLanguage();
      await this.fetchUserInfo();
    },
    methods: {
      async fetchUserInfo() {
        try {
          const msg = await HttpUtil.get('/panel/api/user/info');
          if (msg.success) {
            this.inbounds = msg.obj || [];
          } else {
            this.$message.error(msg.msg || 'Failed to load user info');
          }
        } catch (e) {
          console.error("Failed to get user info:", e);
        }
        this.loading = false;
      },
      formatExpiryTime(timestamp) {
        if (timestamp <= 0) return '{{ i18n "unlimited" }}';
        const date = new Date(timestamp);
        const now = Date.now();
        if (timestamp < now) {
          return date.toLocaleString() + ' ({{ i18n "depleted" }})';
        }
        const diffDays = Math.ceil((timestamp - now) / (1000 * 60 * 60 * 24));
        return date.toLocaleString() + ' (' + diffDays + ' {{ i18n "day" }})';
      },
      logout() {
        location.href = basePath + 'logout/';
      },
    },
  });
</script>
{{ template "page/body_end" .}}
